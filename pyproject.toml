[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentic-trainer"
version = "0.1.0"
description = "Agentic AutoML-lite trainer for tabular CSV/XLSX: planâ†’validateâ†’trainâ†’reportâ†’serve"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [{name = "Venky"}]
dependencies = [
  "numpy>=1.26,<3",
  "pandas>=2.2,<2.4",
  "openpyxl>=3.1,<4",
